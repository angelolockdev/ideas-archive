<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ideas Archive — Archive des idees applicatives</title>
<meta name="description" content="Archive des meilleures idees applicatives — filtrage, visualisation, coups de coeur">
<meta name="theme-color" content="#0b0f1a">
<style>
/* ===== DESIGN SYSTEM ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cvs:#0b0f1a;--bg:#111827;--crd:#1a1f2e;--crd-h:#1f2537;
  --brd:#2a3040;--brd-l:#374151;
  --txt:#f0f2f5;--txt2:#9ca3af;--txt3:#6b7280;
  --ac:#60a5fa;--ac-g:rgba(96,165,250,.12);--ac-h:#3b82f6;
  --gr:#34d399;--gr-g:rgba(52,211,153,.12);
  --or:#f59e0b;--or-g:rgba(245,158,11,.12);
  --pu:#a78bfa;--pu-g:rgba(167,139,250,.12);
  --te:#2dd4bf;--re:#ef4444;--pi:#f472b6;
  --rd:12px;--rd-sm:8px;--rd-xs:6px;
  --sh:0 1px 3px rgba(0,0,0,.3);
  --sh-lg:0 10px 25px rgba(0,0,0,.4);
  --nav-h:56px;
  --tr:color .2s,background .2s,border-color .2s,box-shadow .2s;
}
[data-theme=light]{
  --cvs:#faf9f7;--bg:#f3f4f6;--crd:#fff;--crd-h:#f9fafb;
  --brd:#e5e7eb;--brd-l:#d1d5db;
  --txt:#111827;--txt2:#4b5563;--txt3:#9ca3af;
  --sh:0 1px 3px rgba(0,0,0,.08);
  --sh-lg:0 10px 25px rgba(0,0,0,.1);
}
html{scroll-behavior:smooth}
body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--cvs);color:var(--txt);
  min-height:100vh;line-height:1.5;
  transition:var(--tr);
}
::selection{background:var(--ac);color:#fff}

/* ===== NAV ===== */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(11,15,26,.85);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--brd);
  transition:var(--tr);
}
[data-theme=light] nav{background:rgba(250,249,247,.85)}
.nav-inner{
  max-width:1320px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  height:var(--nav-h);padding:0 24px;
}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;text-decoration:none;color:var(--txt)}
.nav-brand svg{width:26px;height:26px;color:var(--ac)}
.nav-brand span{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-end{display:flex;align-items:center;gap:8px}
.nav-end a{color:var(--txt2);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:var(--rd-sm);transition:all .15s;display:flex;align-items:center;gap:6px}
.nav-end a:hover{color:var(--txt);background:var(--crd)}
.theme-btn{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:var(--rd-sm);
  border:1px solid var(--brd);background:var(--crd);color:var(--txt2);
  cursor:pointer;font-size:16px;transition:all .15s;
}
.theme-btn:hover{border-color:var(--ac);color:var(--ac)}

/* ===== HERO ===== */
.hero{
  padding:48px 0 32px;text-align:center;position:relative;overflow:hidden
}
.hero::before{
  content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);
  width:500px;height:250px;
  background:radial-gradient(ellipse,var(--ac-g) 0%,transparent 70%);
  pointer-events:none
}
.hero h1{font-size:32px;font-weight:800;letter-spacing:-.5px;position:relative}
.hero h1 span{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--txt2);font-size:14px;margin:6px auto 0;position:relative}
.hero p code{font-family:JetBrains Mono,monospace;font-size:13px;background:var(--crd);padding:2px 8px;border-radius:4px;border:1px solid var(--brd)}

/* ===== STATS ===== */
.stats-bar{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;
  margin-bottom:24px
}
.stat-card{
  background:var(--crd);border:1px solid var(--brd);border-radius:var(--rd-sm);
  padding:12px 16px;text-align:center;transition:var(--tr)
}
.stat-card:hover{border-color:var(--brd-l)}
.stat-card .num{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.2}
.stat-card .label{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ===== FILTERS ===== */
.fw{
  background:var(--crd);border:1px solid var(--brd);border-radius:var(--rd);
  padding:14px 18px;margin-bottom:24px;transition:var(--tr)
}
.fr{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fr select,.fr .sw input{
  padding:7px 10px;border-radius:var(--rd-xs);border:1px solid var(--brd);
  background:var(--bg);color:var(--txt);font-size:12.5px;cursor:pointer;
  transition:border-color .15s;min-width:0
}
.fr select:hover,.fr .sw input:hover{border-color:var(--brd-l)}
.fr select:focus,.fr .sw input:focus{outline:none;border-color:var(--ac)}
.sw{position:relative;flex:1;min-width:140px;max-width:220px}
.sw input{width:100%;padding-left:28px}
.sw .si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:13px;pointer-events:none}
.fs{margin-left:auto;font-size:12px;color:var(--txt3);white-space:nowrap}
.bt{
  display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--txt2);
  cursor:pointer;padding:5px 10px;border-radius:var(--rd-xs);
  border:1px solid var(--brd);background:var(--bg);transition:all .15s;user-select:none
}
.bt:hover{border-color:var(--or)}
.bt.on{background:var(--or-g);border-color:var(--or)}
.bt input{display:none}
.bt .star-icon{font-size:13px}
.bt.on .star-icon{color:var(--or)}

/* ===== MONTH ===== */
.ms{margin-bottom:28px}
.mh{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:8px;
  border-bottom:1px solid var(--brd)
}
.mh h2{font-size:17px;font-weight:700}
.mh .cnt{font-size:13px;color:var(--txt3);font-weight:400}
.mh .ml{flex:1;height:1px;background:var(--brd)}

/* ===== GRID ===== */
.gd{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.ic{
  background:var(--crd);border:1px solid var(--brd);border-radius:var(--rd);
  padding:18px;transition:all .2s;position:relative;cursor:default;
  animation:ci .3s ease both
}
@keyframes ci{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ic:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:var(--sh-lg);background:var(--crd-h)}
[data-theme=light] .ic:hover{background:var(--crd-h)}

/* Badges */
.cb{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.cbd{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:600;
  background:var(--bg);color:var(--txt2);border:1px solid var(--brd)
}
.cbd.mada{background:var(--gr-g);color:var(--gr);border-color:rgba(52,211,153,.2)}
.cbd.global{background:var(--ac-g);color:var(--ac);border-color:rgba(96,165,250,.2)}
.cbd.si{background:var(--pu-g);color:var(--pu);border-color:rgba(167,139,250,.2)}
.cat-badge{padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:600}

/* Card content */
.ic .ct{font-size:16px;font-weight:700;margin-bottom:3px;line-height:1.3}
.ic .cd{font-size:11.5px;color:var(--txt3);margin-bottom:6px}
.ic .cdesc{
  font-size:13px;line-height:1.5;color:var(--txt2);margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}
.ic .cm{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.ic .cm span{
  font-size:11px;padding:2px 7px;border-radius:4px;
  background:var(--bg);color:var(--txt3);border:1px solid var(--brd)
}

/* Star */
.sb{
  position:absolute;top:12px;right:12px;
  display:flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:var(--rd-xs);
  background:transparent;border:1px solid var(--brd);color:var(--txt3);
  font-size:14px;cursor:pointer;transition:all .2s
}
.sb:hover{background:var(--or-g);border-color:var(--or);color:var(--or);transform:scale(1.1)}
.sb.on{background:var(--or-g);border-color:var(--or);color:var(--or)}

/* Expand */
.ceb{
  background:none;border:none;color:var(--ac);font-size:11.5px;
  cursor:pointer;padding:0;font-weight:500;transition:opacity .15s
}
.ceb:hover{opacity:.8}
.cdd{
  display:none;margin-top:10px;padding-top:12px;
  border-top:1px solid var(--brd);animation:di .2s ease
}
@keyframes di{from{opacity:0}to{opacity:1}}
.cdd.on{display:block}
.cdd .db{margin-bottom:8px}
.cdd .db:last-child{margin-bottom:0}
.cdd .dl{
  font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--txt3);margin-bottom:2px
}
.cdd .dv{font-size:13px;line-height:1.5;color:var(--txt2)}

/* Diff dots */
.dd{display:inline-flex;gap:2px}
.dd span{width:7px;height:7px;border-radius:50%;display:inline-block}
.dd .f{background:var(--ac)}
.dd .e{background:var(--brd)}

/* ===== EMPTY / LOADING ===== */
.empty{text-align:center;padding:80px 20px}
.empty .ei{font-size:44px;margin-bottom:10px;opacity:.5}
.empty h3{font-size:17px;margin-bottom:4px}
.empty p{color:var(--txt3);font-size:13px}
.loading{display:flex;flex-direction:column;align-items:center;padding:100px 20px;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--txt3);font-size:13px}

/* ===== FOOTER ===== */
footer{text-align:center;padding:28px 0;border-top:1px solid var(--brd);margin-top:40px}
footer p{font-size:12px;color:var(--txt3)}
footer a{color:var(--ac);text-decoration:none}
footer a:hover{text-decoration:underline}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:var(--cvs)}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--brd-l)}
@media(max-width:768px){
  .hero h1{font-size:24px}
  .fr{flex-direction:column}
  .fr select,.sw,.bt{width:100%;max-width:100%}
  .fs{margin-left:0;text-align:center;width:100%}
  .gd{grid-template-columns:1fr}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="#" class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span>Ideas Archive</span>
    </a>
    <div class="nav-end">
      <a href="https://github.com/angelolockdev/ideas-archive" target="_blank">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.06.58 1.21.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
      <button class="theme-btn" id="theme-btn" title="Basculer theme">&#9680;</button>
    </div>
  </div>
</nav>

<div class="hero">
  <h1><span>Archive</span> des idees applicatives</h1>
  <p>Les meilleures idees de <code>#cron-idees-apps</code> — archivees, classees, filtrees</p>
</div>

<div class="container" style="max-width:1320px;margin:0 auto;padding:0 24px">
  <div class="stats-bar" id="stats-bar">
    <div class="stat-card"><div class="num" style="color:var(--ac)" id="s-total">—</div><div class="label">Idees</div></div>
    <div class="stat-card"><div class="num" style="color:var(--or)" id="s-starred">—</div><div class="label">Coups de coeur</div></div>
    <div class="stat-card"><div class="num" style="color:var(--pu)" id="s-mada">—</div><div class="label">Madagascar</div></div>
    <div class="stat-card"><div class="num" style="color:var(--gr)" id="s-global">—</div><div class="label">Global</div></div>
  </div>

  <div class="fw">
    <div class="fr">
      <select id="f-month"><option value="all">Tous les mois</option></select>
      <select id="f-cat">
        <option value="all">Toutes categories</option>
        <option value="productivity">Productivite</option>
        <option value="ai">IA / ML</option>
        <option value="fintech">Fintech</option>
        <option value="health">Sante</option>
        <option value="transport">Transport</option>
        <option value="climate">Climat</option>
        <option value="social">Social</option>
        <option value="edtech">Education</option>
        <option value="devtools">DevTools</option>
        <option value="iot">IoT</option>
        <option value="other">Autre</option>
      </select>
      <select id="f-region"><option value="all">Toutes regions</option><option value="global">Global</option><option value="madagascar">Madagascar</option></select>
      <select id="f-source"><option value="all">Toutes sources</option><option value="idees-matin">Idees du matin</option><option value="self-improving">Self-Improving</option></select>
      <div class="sw"><span class="si">&#128269;</span><input type="text" id="f-search" placeholder="Rechercher..." autocomplete="off"></div>
      <label class="bt" id="bt-label"><input type="checkbox" id="bt-only"><span class="star-icon">&#9733;</span> Meilleures</label>
      <span class="fs" id="f-stats"></span>
    </div>
  </div>

  <div id="content"><div class="loading"><div class="spinner"></div><p>Chargement des idees...</p></div></div>
</div>

<footer><p>Ideas Archive — <a href="https://github.com/angelolockdev/ideas-archive" target="_blank">angelolockdev/ideas-archive</a></p></footer>

<script>
// ===== DATA =====
const MONTHS_FR = ['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];
const CATEGORIES = {productivity:'Productivite',ai:'IA / ML',fintech:'Fintech',health:'Sante',transport:'Transport',climate:'Climat',social:'Social',edtech:'Education',devtools:'DevTools',iot:'IoT',other:'Autre'};
const CAT_COLORS = {productivity:'#34d399',ai:'#a78bfa',fintech:'#f59e0b',health:'#2dd4bf',transport:'#60a5fa',climate:'#34d399',social:'#ef4444',edtech:'#f59e0b',devtools:'#a78bfa',iot:'#2dd4bf',other:'#9ca3af'};
const CAT_ICONS = {productivity:'&#9889;',ai:'&#129302;',fintech:'&#128176;',health:'&#10084;&#65039;',transport:'&#128662;',climate:'&#127758;',social:'&#128101;',edtech:'&#127891;',devtools:'&#128295;',iot:'&#127961;',other:'&#128161;'};

let allIdeas = [];
let allMonths = ['2026-07','2026-06']; // add months here as they're created

// ===== THEME =====
(function(){
  const t = localStorage.getItem('ia-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  const meta = document.querySelector('meta[name=theme-color]');
  if(meta) meta.content = t==='light'?'#faf9f7':'#0b0f1a';
})();

document.getElementById('theme-btn').onclick = function(){
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('ia-theme', next);
  const meta = document.querySelector('meta[name=theme-color]');
  if(meta) meta.content = next==='light'?'#faf9f7':'#0b0f1a';
};

// ===== LOAD DATA =====
async function load(){
  for(const m of allMonths){
    try{
      const r = await fetch(`data/${m}.json`);
      if(r.ok){const d=await r.json();d._m=m;allIdeas=allIdeas.concat(d.ideas||[]);}
    }catch(e){}
  }
  allMonths = [...new Set(allIdeas.map(i=>i.date.substring(0,7)))].sort().reverse();
  render();
}

function mlabel(ym){const p=ym.split('-');return `${MONTHS_FR[parseInt(p[1])-1]} ${p[0]}`;}

function render(){
  const ideas=allIdeas;
  for(const[id,el] of [['s-total',ideas.length],['s-starred',ideas.filter(i=>i.status==='starred').length],['s-mada',ideas.filter(i=>i.region==='madagascar').length],['s-global',ideas.filter(i=>i.region==='global').length]])
    document.getElementById(id).textContent=el;

  const sel=document.getElementById('f-month');
  sel.innerHTML='<option value="all">Tous les mois</option>';
  allMonths.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=mlabel(m);sel.appendChild(o);});
  apply();
}

function apply(){
  const month=document.getElementById('f-month').value;
  const cat=document.getElementById('f-cat').value;
  const region=document.getElementById('f-region').value;
  const source=document.getElementById('f-source').value;
  const query=document.getElementById('f-search').value.toLowerCase().trim();
  const best=document.getElementById('bt-only').checked;

  let f=allIdeas.filter(i=>{
    if(month!=='all'&&i.date.substring(0,7)!==month)return false;
    if(cat!=='all'&&i.category!==cat)return false;
    if(region!=='all'&&i.region!==region)return false;
    if(source!=='all'&&i.source!==source)return false;
    if(query&&!(i.title||'').toLowerCase().includes(query)&&!(i.description||'').toLowerCase().includes(query)&&!(i.problem||'').toLowerCase().includes(query))return false;
    if(best&&i.status!=='starred')return false;
    return true;
  });

  const groups={};
  f.forEach(i=>{const m=i.date.substring(0,7);if(!groups[m])groups[m]=[];groups[m].push(i);});
  const sm=Object.keys(groups).sort().reverse();

  document.getElementById('f-stats').textContent=`${f.length} / ${allIdeas.length}`;
  document.getElementById('bt-label').classList.toggle('on',best);

  const el=document.getElementById('content');
  if(!f.length){
    el.innerHTML='<div class="empty"><div class="ei">&#128161;</div><h3>Aucune idee trouvee</h3><p>Essayez de modifier les filtres.</p></div>';
    return;
  }

  let html='';
  sm.forEach(m=>{
    html+=`<div class="ms"><div class="mh"><h2>${mlabel(m)}</h2><span class="cnt">${groups[m].length} idee${groups[m].length>1?'s':''}</span><div class="ml"></div></div><div class="gd">`;
    groups[m].sort((a,b)=>b.date.localeCompare(a.date)).forEach((idea,i)=>{
      const st=idea.status==='starred';
      const cc=CAT_COLORS[idea.category]||'#9ca3af';
      const ci=CAT_ICONS[idea.category]||'&#128161;';
      const rgl=idea.region==='madagascar'?'&#127470;&#127473; Mada':'&#127758; Global';
      const rgc=idea.region==='madagascar'?'mada':'global';
      let dhtml='';
      if(idea.difficulty){
        dhtml='<span class="dd">'+Array.from({length:5},(_,j)=>`<span class="${j<idea.difficulty?'f':'e'}"></span>`).join('')+'</span>';
      }
      html+=`
        <div class="ic" data-id="${idea.id}" style="animation-delay:${(i%5)*40}ms">
          <button class="sb ${st?'on':''}" onclick="ts('${idea.id}')">${st?'&#9733;':'&#9734;'}</button>
          <div class="cb">
            <span class="cat-badge" style="background:${cc}18;color:${cc}">${ci} ${CATEGORIES[idea.category]||idea.category}</span>
            <span class="cbd ${rgc}">${rgl}</span>
            ${idea.source==='self-improving'?'<span class="cbd si">Self-Improving</span>':''}
          </div>
          <div class="ct">${idea.title}</div>
          <div class="cd">${fdate(idea.date)}${idea.theme?' &middot; '+idea.theme:''}${dhtml?' &middot; '+dhtml:''}</div>
          <p class="cdesc">${idea.description||idea.problem||''}</p>
          <div class="cm">
            ${idea.market?`<span>&#127991; ${trunc(idea.market,40)}</span>`:''}
            ${idea.revenue?`<span>&#128176; ${trunc(idea.revenue,35)}</span>`:''}
            ${idea.stack?`<span>&#128295; ${trunc(idea.stack,30)}</span>`:''}
          </div>
          <button class="ceb" onclick="td('${idea.id}')">Voir plus &darr;</button>
          <div class="cdd" id="dd-${idea.id}">
            ${idea.description?`<div class="db"><div class="dl">Description</div><div class="dv">${idea.description}</div></div>`:''}
            ${idea.problem?`<div class="db"><div class="dl">Probleme</div><div class="dv">${idea.problem}</div></div>`:''}
            ${idea.market?`<div class="db"><div class="dl">Marche</div><div class="dv">${idea.market}</div></div>`:''}
            ${idea.revenue?`<div class="db"><div class="dl">Revenus</div><div class="dv">${idea.revenue}</div></div>`:''}
            ${idea.stack?`<div class="db"><div class="dl">Stack</div><div class="dv">${idea.stack}</div></div>`:''}
            ${idea.why_now?`<div class="db"><div class="dl">Pourquoi maintenant</div><div class="dv">${idea.why_now}</div></div>`:''}
            ${idea.mvp_plan?`<div class="db"><div class="dl">MVP</div><div class="dv">${idea.mvp_plan}</div></div>`:''}
          </div>
        </div>`;
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
}

function ts(id){
  const i=allIdeas.find(x=>x.id===id);
  if(!i)return;
  i.status=i.status==='starred'?'pending':'starred';
  apply();
  document.getElementById('s-starred').textContent=allIdeas.filter(x=>x.status==='starred').length;
  save();
}
function td(id){const el=document.getElementById('dd-'+id);if(el)el.classList.toggle('on');}
function trunc(s,m){if(!s)return '';return s.length>m?s.substring(0,m)+'...':s;}
function fdate(d){const p=d.split('-');return `${parseInt(p[2])} ${MONTHS_FR[parseInt(p[1])-1].substring(0,3)} ${p[0]}`;}
function save(){try{localStorage.setItem('ia-stars',JSON.stringify(allIdeas.filter(i=>i.status==='starred').map(i=>i.id)))}catch(e){}}
function loadStars(){
  try{JSON.parse(localStorage.getItem('ia-stars')||'[]').forEach(id=>{const i=allIdeas.find(x=>x.id===id);if(i)i.status='starred';})}catch(e){}
}

document.getElementById('f-month').addEventListener('change',apply);
document.getElementById('f-cat').addEventListener('change',apply);
document.getElementById('f-region').addEventListener('change',apply);
document.getElementById('f-source').addEventListener('change',apply);
document.getElementById('f-search').addEventListener('input',apply);
document.getElementById('bt-only').addEventListener('change',apply);

load().then(()=>{loadStars();apply();});
</script>
