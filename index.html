<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ideas Archive — Meilleures idees applicatives</title>
<meta name="description" content="Archive des meilleures idees applicatives — filtrage, visualisation, coups de coeur">
<meta property="og:title" content="Ideas Archive">
<meta property="og:description" content="Archive des meilleures idees applicatives">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0d1117">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0b0f1a;
  --bg2: #111827;
  --card: #1a1f2e;
  --card-hover: #1f2537;
  --border: #2a3040;
  --border-light: #374151;
  --text: #f0f2f5;
  --text2: #9ca3af;
  --text3: #6b7280;
  --accent: #60a5fa;
  --accent-glow: rgba(96,165,250,.15);
  --green: #34d399;
  --orange: #f59e0b;
  --red: #ef4444;
  --purple: #a78bfa;
  --teal: #2dd4bf;
  --pink: #f472b6;
  --gradient: linear-gradient(135deg, #60a5fa, #a78bfa);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.4);
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}
::selection { background: var(--accent); color: #fff; }

/* ===== CONTAINER ===== */
.container { max-width: 1320px; margin: 0 auto; padding: 0 24px; }

/* ===== NAV ===== */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11,15,26,.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.nav-inner {
  max-width: 1320px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  gap: 16px;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 16px;
  color: var(--text);
  text-decoration: none;
}
.nav-brand svg { width: 28px; height: 28px; }
.nav-brand span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nav-links {
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-links a {
  color: var(--text2);
  text-decoration: none;
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 8px;
  transition: all .15s;
}
.nav-links a:hover { color: var(--text); background: var(--card); }
.nav-links .gh-link {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text2);
}
.nav-links .gh-link:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ===== HERO ===== */
.hero {
  padding: 48px 0 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 300px;
  background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
}
.hero h1 {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -.5px;
  position: relative;
}
.hero h1 span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero p {
  color: var(--text2);
  font-size: 15px;
  max-width: 520px;
  margin: 8px auto 0;
  position: relative;
}

/* ===== STATS BAR ===== */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  text-align: center;
  transition: border-color .15s;
}
.stat-card:hover { border-color: var(--border-light); }
.stat-card .num {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -.5px;
  line-height: 1.2;
}
.stat-card .label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-top: 2px;
}
.stat-card .num.accent { color: var(--accent); }
.stat-card .num.green { color: var(--green); }
.stat-card .num.purple { color: var(--purple); }
.stat-card .num.orange { color: var(--orange); }

/* ===== FILTERS ===== */
.filters-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
}
.filters-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.filters-row select, .filters-row .search-wrap input {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: border-color .15s;
  min-width: 0;
}
.filters-row select:hover, .filters-row .search-wrap input:hover { border-color: var(--border-light); }
.filters-row select:focus, .filters-row .search-wrap input:focus { outline: none; border-color: var(--accent); }
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 160px;
  max-width: 260px;
}
.search-wrap input {
  width: 100%;
  padding-left: 32px;
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
}
.filter-stats {
  margin-left: auto;
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
}
.best-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg2);
  transition: all .15s;
  user-select: none;
}
.best-toggle:hover { border-color: var(--orange); }
.best-toggle.active { background: rgba(245,158,11,.1); border-color: var(--orange); }
.best-toggle input { display: none; }
.best-toggle .star-icon { font-size: 14px; }
.best-toggle.active .star-icon { color: var(--orange); }

/* ===== MONTH SECTIONS ===== */
.month-section { margin-bottom: 32px; }
.month-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.month-header h2 {
  font-size: 18px;
  font-weight: 700;
}
.month-header .count {
  font-size: 13px;
  color: var(--text3);
  font-weight: 400;
}
.month-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ===== GRID ===== */
.ideas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 16px;
}
.idea-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all .2s;
  position: relative;
  cursor: default;
  animation: cardIn .3s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.idea-card:nth-child(1) { animation-delay: 0ms; }
.idea-card:nth-child(2) { animation-delay: 40ms; }
.idea-card:nth-child(3) { animation-delay: 80ms; }
.idea-card:nth-child(4) { animation-delay: 120ms; }
.idea-card:nth-child(5) { animation-delay: 160ms; }

.idea-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
  background: var(--card-hover);
}

/* Badges */
.card-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.card-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.card-badge.mada { background: rgba(52,211,153,.1); color: var(--green); border-color: rgba(52,211,153,.2); }
.card-badge.global { background: rgba(96,165,250,.1); color: var(--accent); border-color: rgba(96,165,250,.2); }
.card-badge.self-improving { background: rgba(167,139,250,.1); color: var(--purple); border-color: rgba(167,139,250,.2); }

/* Category badge */
.cat-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}
.cat-productivity { background: rgba(52,211,153,.12); color: var(--green); }
.cat-ai { background: rgba(167,139,250,.12); color: var(--purple); }
.cat-fintech { background: rgba(245,158,11,.12); color: var(--orange); }
.cat-health { background: rgba(45,212,191,.12); color: var(--teal); }
.cat-transport { background: rgba(96,165,250,.12); color: var(--accent); }
.cat-climate { background: rgba(52,211,153,.12); color: var(--green); }
.cat-social { background: rgba(239,68,68,.12); color: var(--red); }
.cat-edtech { background: rgba(245,158,11,.12); color: var(--orange); }
.cat-devtools { background: rgba(167,139,250,.12); color: var(--purple); }
.cat-iot { background: rgba(45,212,191,.12); color: var(--teal); }
.cat-other { background: rgba(156,163,175,.12); color: var(--text2); }

/* Card content */
.idea-card .card-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text);
  line-height: 1.3;
}
.idea-card .card-date {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 8px;
}
.idea-card .card-desc {
  font-size: 13px;
  line-height: 1.55;
  color: var(--text2);
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.idea-card .card-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.idea-card .card-meta span {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--bg2);
  color: var(--text3);
  border: 1px solid var(--border);
}

/* Star button */
.star-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text3);
  font-size: 15px;
  cursor: pointer;
  transition: all .2s;
}
.star-btn:hover {
  background: rgba(245,158,11,.1);
  border-color: var(--orange);
  color: var(--orange);
  transform: scale(1.1);
}
.star-btn.starred {
  background: rgba(245,158,11,.15);
  border-color: var(--orange);
  color: var(--orange);
  box-shadow: 0 0 12px rgba(245,158,11,.2);
}

/* Expand */
.card-expand-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 12px;
  cursor: pointer;
  padding: 0;
  font-weight: 500;
  transition: opacity .15s;
}
.card-expand-btn:hover { opacity: .8; }
.card-details {
  display: none;
  margin-top: 12px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  animation: detailsIn .2s ease;
}
@keyframes detailsIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.card-details.open { display: block; }
.card-details .detail-block { margin-bottom: 10px; }
.card-details .detail-block:last-child { margin-bottom: 0; }
.card-details .detail-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text3);
  margin-bottom: 2px;
}
.card-details .detail-value {
  font-size: 13px;
  line-height: 1.5;
  color: var(--text2);
}

/* Difficulty dots */
.diff-dots { display: inline-flex; gap: 3px; }
.diff-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.diff-dot.filled { background: var(--accent); }
.diff-dot.empty { background: var(--border); }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 80px 20px;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state h3 { font-size: 18px; margin-bottom: 6px; }
.empty-state p { color: var(--text3); font-size: 14px; }

/* ===== LOADING ===== */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 20px;
  gap: 16px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: var(--text3); font-size: 14px; }

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 32px 0;
  border-top: 1px solid var(--border);
  margin-top: 48px;
}
footer p { font-size: 12px; color: var(--text3); }
footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .hero h1 { font-size: 26px; }
  .hero p { font-size: 14px; }
  .filters-row { flex-direction: column; }
  .filters-row select, .filters-row .search-wrap, .filters-row .best-toggle { width: 100%; max-width: 100%; }
  .filter-stats { margin-left: 0; text-align: center; width: 100%; }
  .ideas-grid { grid-template-columns: 1fr; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .nav-links .gh-link span { display: none; }
}
@media (max-width: 480px) {
  .hero { padding: 32px 0 24px; }
  .hero h1 { font-size: 22px; }
  .container { padding: 0 16px; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
</style>
</head>

<div class="container">
  <section class="hero">
    <h1><span>Archive</span> des idees applicatives</h1>
    <p>Les meilleures idees du channel <code>#cron-idees-apps</code> — archivees, classees, filtrées</p>
  </section>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-card"><div class="num accent" id="stat-total">—</div><div class="label">Idees</div></div>
    <div class="stat-card"><div class="num orange" id="stat-starred">—</div><div class="label">Coups de coeur</div></div>
    <div class="stat-card"><div class="num purple" id="stat-mada">—</div><div class="label">Madagascar</div></div>
    <div class="stat-card"><div class="num green" id="stat-global">—</div><div class="label">Global</div></div>
  </div>

  <div class="filters-wrap">
    <div class="filters-row">
      <select id="month-filter">
        <option value="all">Tous les mois</option>
      </select>
      <select id="category-filter">
        <option value="all">Toutes categories</option>
        <option value="productivity">Productivite</option>
        <option value="ai">IA / ML</option>
        <option value="fintech">Fintech</option>
        <option value="health">Sante</option>
        <option value="transport">Transport</option>
        <option value="climate">Climat</option>
        <option value="social">Social</option>
        <option value="edtech">Education</option>
        <option value="devtools">DevTools</option>
        <option value="iot">IoT</option>
        <option value="other">Autre</option>
      </select>
      <select id="region-filter">
        <option value="all">Toutes regions</option>
        <option value="global">Global</option>
        <option value="madagascar">Madagascar</option>
      </select>
      <select id="source-filter">
        <option value="all">Toutes sources</option>
        <option value="idees-matin">Idees du matin</option>
        <option value="self-improving">Self-Improving</option>
      </select>
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="search-input" placeholder="Rechercher..." autocomplete="off">
      </div>
      <label class="best-toggle" id="best-toggle-label">
        <input type="checkbox" id="best-only">
        <span class="star-icon">&#9733;</span>
        Meilleures idees
      </label>
      <span class="filter-stats" id="filter-stats"></span>
    </div>
  </div>

  <div id="content">
    <div class="loading">

<script>
let allData = { ideas: [] };

async function loadAllMonths() {
  const months = ['2026-07'];
  const allMonths = [];
  for (const m of months) {
    try {
      const resp = await fetch(`data/${m}.json`);
      if (resp.ok) {
        const data = await resp.json();
        data._month = m;
        allMonths.push(data);
      }
    } catch(e) {}
  }
  allData.ideas = allMonths.flatMap(m => m.ideas || []);
  render();
}

function getMonthLabel(ym) {
  const months = ['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];
  const parts = ym.split('-');
  return `${months[parseInt(parts[1])-1]} ${parts[0]}`;
}

function render() {
  const ideas = allData.ideas;
  document.getElementById('stat-total').textContent = ideas.length;
  document.getElementById('stat-starred').textContent = ideas.filter(i => i.status === 'starred').length;
  document.getElementById('stat-mada').textContent = ideas.filter(i => i.region === 'madagascar').length;
  document.getElementById('stat-global').textContent = ideas.filter(i => i.region === 'global').length;

  const months = [...new Set(ideas.map(i => i.date.substring(0,7)))].sort().reverse();
  const sel = document.getElementById('month-filter');
  sel.innerHTML = '<option value="all">Tous les mois</option>';
  months.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = getMonthLabel(m); sel.appendChild(o); });
  applyFilters();
}

function applyFilters() {
  const month = document.getElementById('month-filter').value;
  const cat = document.getElementById('category-filter').value;
  const region = document.getElementById('region-filter').value;
  const source = document.getElementById('source-filter').value;
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  const bestOnly = document.getElementById('best-only').checked;

  let filtered = [...allData.ideas];
  if (month !== 'all') filtered = filtered.filter(i => i.date.substring(0,7) === month);
  if (cat !== 'all') filtered = filtered.filter(i => i.category === cat);
  if (region !== 'all') filtered = filtered.filter(i => i.region === region);
  if (source !== 'all') filtered = filtered.filter(i => i.source === source);
  if (query) filtered = filtered.filter(i => (i.title||'').toLowerCase().includes(query) || (i.description||'').toLowerCase().includes(query) || (i.problem||'').toLowerCase().includes(query));
  if (bestOnly) filtered = filtered.filter(i => i.status === 'starred');

  const groups = {};
  filtered.forEach(i => { const m = i.date.substring(0,7); if (!groups[m]) groups[m] = []; groups[m].push(i); });
  const sortedMonths = Object.keys(groups).sort().reverse();

  document.getElementById('filter-stats').textContent = `${filtered.length} / ${allData.ideas.length} idees`;
  document.getElementById('best-toggle-label').classList.toggle('active', bestOnly);

  const el = document.getElementById('content');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">&#128161;</div><h3>Aucune idee trouvee</h3><p>Essayez de modifier les filtres ou d\'elargir la recherche.</p></div>';
    return;
  }

  let html = '';
  sortedMonths.forEach(m => {
    html += `<div class="month-section"><div class="month-header"><h2>${getMonthLabel(m)}</h2><span class="count">${groups[m].length} idee${groups[m].length>1?'s':''}</span><div class="month-line"></div></div><div class="ideas-grid">`;
    groups[m].sort((a,b) => b.date.localeCompare(a.date)).forEach((idea, idx) => {
      const isStarred = idea.status === 'starred';
      const catClass = `cat-${idea.category||'other'}`;
      let diffHtml = '';
      if (idea.difficulty) {
        diffHtml = '<span class="diff-dots">' + 
          Array.from({length:5}, (_,i) => `<span class="diff-dot ${i<idea.difficulty?'filled':'empty'}"></span>`).join('') +
          `</span>`;
      }
      html += `
        <div class="idea-card" data-id="${idea.id}" style="animation-delay:${(idx%5)*40}ms">
          <button class="star-btn ${isStarred?'starred':''}" onclick="toggleStar('${idea.id}')" title="${isStarred?'Retirer des coups de coeur':'Ajouter aux coups de coeur'}">${isStarred?'&#9733;':'&#9734;'}</button>
          <div class="card-badges">
            <span class="card-badge ${catClass}">${catIcon(idea.category)} ${idea.category||'other'}</span>
            <span class="card-badge ${idea.region==='madagascar'?'mada':'global'}">${idea.region==='madagascar'?'&#127470;&#127473; Mada':'&#127758; Global'}</span>
            ${idea.source==='self-improving'?'<span class="card-badge self-improving">Self-Improving</span>':''}
          </div>
          <h3 class="card-title">${idea.title}</h3>
          <div class="card-date">${formatDate(idea.date)}${idea.theme?' &middot; '+idea.theme:''}${diffHtml?' &middot; '+diffHtml:''}</div>
          <p class="card-desc">${idea.description || idea.problem || ''}</p>
          <div class="card-meta">
            ${idea.market?`<span>&#127991; ${truncate(idea.market,45)}</span>`:''}
            ${idea.revenue?`<span>&#128176; ${truncate(idea.revenue,40)}</span>`:''}
            ${idea.stack?`<span>&#128295; ${truncate(idea.stack,35)}</span>`:''}
          </div>
          <button class="card-expand-btn" onclick="toggleDetails('${idea.id}')">Voir plus &darr;</button>
          <div class="card-details" id="details-${idea.id}">
            ${idea.description?`<div class="detail-block"><div class="detail-label">Description</div><div class="detail-value">${idea.description}</div></div>`:''}
            ${idea.problem?`<div class="detail-block"><div class="detail-label">Probleme resolu</div><div class="detail-value">${idea.problem}</div></div>`:''}
            ${idea.market?`<div class="detail-block"><div class="detail-label">Marche cible</div><div class="detail-value">${idea.market}</div></div>`:''}
            ${idea.revenue?`<div class="detail-block"><div class="detail-label">Modele de revenus</div><div class="detail-value">${idea.revenue}</div></div>`:''}
            ${idea.stack?`<div class="detail-block"><div class="detail-label">Stack technique</div><div class="detail-value">${idea.stack}</div></div>`:''}
            ${idea.why_now?`<div class="detail-block"><div class="detail-label">Pourquoi maintenant</div><div class="detail-value">${idea.why_now}</div></div>`:''}
            ${idea.mvp_plan?`<div class="detail-block"><div class="detail-label">MVP</div><div class="detail-value">${idea.mvp_plan}</div></div>`:''}
          </div>
        </div>`;
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
}

function catIcon(cat) {
  const icons = {
    'productivity':'&#9889;','ai':'&#129302;','fintech':'&#128176;','health':'&#10084;&#65039;',
    'transport':'&#128662;','climate':'&#127758;','social':'&#128101;','edtech':'&#127891;',
    'devtools':'&#128295;','iot':'&#127961;','other':'&#128161;'
  };
  return icons[cat] || icons['other'];
}

function toggleStar(id) {
  const idea = allData.ideas.find(i => i.id === id);
  if (!idea) return;
  idea.status = idea.status === 'starred' ? 'pending' : 'starred';
  applyFilters();
  document.getElementById('stat-starred').textContent = allData.ideas.filter(i => i.status === 'starred').length;
  saveStars();
}

function toggleDetails(id) {
  const el = document.getElementById('details-'+id);
  if (el) el.classList.toggle('open');
}

function truncate(s, max) {
  if (!s) return '';
  return s.length > max ? s.substring(0, max) + '...' : s;
}

function formatDate(d) {
  const p = d.split('-');
  const months = ['Jan','Fev','Mar','Avr','Mai','Juin','Juil','Aou','Sep','Oct','Nov','Dec'];
  return `${parseInt(p[2])} ${months[parseInt(p[1])-1]} ${p[0]}`;
}

function saveStars() {
  const starred = allData.ideas.filter(i => i.status === 'starred').map(i => i.id);
  try { localStorage.setItem('ideas-archive-stars', JSON.stringify(starred)); } catch(e) {}
}

function loadStars() {
  try {
    JSON.parse(localStorage.getItem('ideas-archive-stars') || '[]').forEach(id => {
      const idea = allData.ideas.find(i => i.id === id);
      if (idea) idea.status = 'starred';
    });
  } catch(e) {}
}

document.getElementById('month-filter').addEventListener('change', applyFilters);
document.getElementById('category-filter').addEventListener('change', applyFilters);
document.getElementById('region-filter').addEventListener('change', applyFilters);
document.getElementById('source-filter').addEventListener('change', applyFilters);
document.getElementById('search-input').addEventListener('input', applyFilters);
document.getElementById('best-only').addEventListener('change', applyFilters);

loadAllMonths().then(() => { loadStars(); applyFilters(); });
</script>
</body>
</html>
